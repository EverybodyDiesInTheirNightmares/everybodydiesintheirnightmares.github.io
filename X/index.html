<script>
    function escapeHtml(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    class NeoDB {
        constructor(config) {
            this.containerSelector = config.container;
            this.types = config.types ?? ["book", "movie", "music", "game","tv"];
            this.typeNames = {
                book: "书",
                movie: "影",
                music: "音",
                game: "游",
                tv: "剧"
            };
            this.baseAPI = config.baseAPI;
            this.type = "book";
            this.status = "complete";
            this.finished = false;
            this.paged = 1;
            this.subjects = [];
            this.musicData = null;
            this._create();
        }

        // Get all container elements (both original and kindle copies)
        _getAllContainers() {
            return document.querySelectorAll(this.containerSelector);
        }

        // Apply function to all containers
        _applyToAll(fn) {
            this._getAllContainers().forEach(fn);
        }

        // Query within all containers
        _queryAll(selector) {
            return document.querySelectorAll(selector);
        }

        on(event, element, callback) {
            const nodeList = document.querySelectorAll(element);
            nodeList.forEach((item) => {
                item.addEventListener(event, callback);
            });
        }

        _handleTypeClick() {
            this.on("click", ".neodb-navItem", (t) => {
                const self = t.currentTarget;
                this.type = self.dataset.type;
                document.querySelectorAll(".neodb-navItem").forEach(el => el.classList.remove("active"));
                self.classList.add("active");
                this._clearList();
                this._toggleLoading(true);
                this.paged = 1;
                this.finished = false;
                this.subjects = [];
                this._fetchData();
            });
        }

        _renderTypes() {
            this._applyToAll(container => {
                const nav = container.querySelector(".neodb-nav");
                if (nav) {
                    nav.innerHTML = this.types
                        .map((item) => {
                            const isActive = item === this.type ? ' active' : '';
                            return `<span class="neodb-navItem${isActive}" data-type="${item}"><span class="nav-text">${this.typeNames[item]}</span></span>`;
                        })
                        .join("");
                }
            });
            this._handleTypeClick();
        }

        _fetchData() {
            if (this.type === 'music') {
                return this._fetchMusicData();
            }

            const params = new URLSearchParams({
                type: "complete",
                category: this.type,
                page: this.paged.toString(),
            });

            return fetch(this.baseAPI + "?" + params.toString())
                .then((response) => response.json())
                .then((data) => {
                    if (data.length) {
                        // 过滤重复项
                        data = data.filter(item => !this.subjects.some(existing => existing.item.id === item.item.id));

                        if (data.length) {
                            this.subjects = [...this.subjects, ...data];
                            this._renderListTemplate();
                        }

                        this._toggleLoading(false);
                    } else {
                        this.finished = true; // 没有更多数据
                        this._toggleLoading(false);
                    }
                });
        }

        _fetchMusicData() {
            // API 列表：优先 Meting 格式，备用网易云 API 格式
            const MUSIC_APIS = [
                { url: 'https://api.injahow.cn/meting/?type=playlist&id=5244529625', type: 'meting' },
                { url: 'https://zm.wwoyun.cn/playlist/detail?id=5244529625', type: 'netease' },
            ];

            const normalize = (data, type) => {
                if (type === 'meting' && Array.isArray(data)) {
                    return data.map(s => ({
                        name: s.name,
                        artist: s.artist || '',
                        id: s.url ? (s.url.match(/id=(\d+)/) || [])[1] : ''
                    }));
                }
                if (type === 'netease' && data.playlist && data.playlist.tracks) {
                    return data.playlist.tracks.map(s => ({
                        name: s.name,
                        artist: (s.ar || []).map(a => a.name).join('/'),
                        id: String(s.id)
                    }));
                }
                return null;
            };

            const tryFetch = (index) => {
                if (index >= MUSIC_APIS.length) {
                    this.finished = true;
                    this._toggleLoading(false);
                    this._applyToAll(container => {
                        const list = container.querySelector(".neodb-list");
                        if (list) list.innerHTML = '<div class="neodb-loading">加载失败，请稍后再试</div>';
                    });
                    return;
                }
                const api = MUSIC_APIS[index];
                fetch(api.url)
                    .then(r => r.json())
                    .then(data => {
                        const songs = normalize(data, api.type);
                        if (songs && songs.length) {
                            this.musicData = songs;
                            this.finished = true;
                            this._renderMusicList(songs);
                            this._toggleLoading(false);
                        } else {
                            tryFetch(index + 1);
                        }
                    })
                    .catch(() => tryFetch(index + 1));
            };

            if (this.musicData) {
                this._renderMusicList(this.musicData);
                this._toggleLoading(false);
                return;
            }
            tryFetch(0);
        }

        _renderMusicList(data) {
            const html = data.map(song => {
                const link = song.id ? `https://music.163.com/#/song?id=${song.id}` : '#';
                const title = "《" + song.name + "》";
                const artist = song.artist || '';

                return `<div class="neodb-item">
                    <div class="neodb-title">
                        <a href="${escapeHtml(link)}" target="_blank">${escapeHtml(title)}</a>
                    </div>
                    <div class="neodb-comment">
                        ${artist ? `<p>${escapeHtml(artist)}</p>` : ""}
                    </div>
                </div>`;
            }).join("");

            this._applyToAll(container => {
                const list = container.querySelector(".neodb-list");
                if (list) list.innerHTML = html;
            });
        }

        _renderListTemplate() {
            const html = this.subjects
                .map((item) => {
                    const title = "《"+item.item.title+"》";
                    const link = item.item.id;
                    const comment_text = item.comment_text;

                    return `<div class="neodb-item">
                        <div class="neodb-title">
                            <a href="${escapeHtml(link)}" target="_blank">${escapeHtml(title)}</a>
                        </div>
                        <div class="neodb-comment">
                            ${comment_text ? `<p>${escapeHtml(comment_text)}</p>` : ""}
                        </div>
                    </div>`;
                })
                .join("");
            this._applyToAll(container => {
                const list = container.querySelector(".neodb-list");
                if (list) list.innerHTML = html;
            });
        }

        _getScrollContainers() {
            const containers = [window];
            const kindleScreen = document.getElementById("kindle-screen");
            if (kindleScreen) containers.push(kindleScreen);
            return containers;
        }

        _handleScroll() {
            let isLoading = false;

            const checkScroll = (scrollEl, isWindow) => {
                const moreElements = this._queryAll(".block-more");
                if (!moreElements.length || this.finished || isLoading) return;

                let scrollTop, viewportHeight;
                if (isWindow) {
                    scrollTop = window.scrollY || window.pageYOffset;
                    viewportHeight = window.innerHeight;
                } else {
                    scrollTop = scrollEl.scrollTop;
                    viewportHeight = scrollEl.clientHeight;
                }

                // Check if ANY .block-more is near bottom of the scroll viewport
                let shouldLoad = false;
                moreElements.forEach(moreElement => {
                    // Get the element's position relative to the scroll container
                    let moreBottom;
                    if (isWindow) {
                        moreBottom = moreElement.offsetTop + moreElement.clientHeight;
                    } else {
                        moreBottom = moreElement.offsetTop - scrollEl.offsetTop + moreElement.clientHeight;
                    }
                    if (moreBottom <= scrollTop + viewportHeight) {
                        shouldLoad = true;
                    }
                });

                if (shouldLoad && this._isLoadingHidden()) {
                    isLoading = true;
                    this._toggleLoading(true);
                    this.paged++;
                    this._fetchData().finally(() => {
                        isLoading = false;
                    });
                }
            };

            this._getScrollContainers().forEach(sc => {
                if (sc === window) {
                    window.addEventListener("scroll", () => checkScroll(window, true));
                } else {
                    sc.addEventListener("scroll", () => checkScroll(sc, false));
                }
            });
        }

        _create() {
            if (!document.querySelector(".neodb-container")) return;

            this._applyToAll(container => {
                container.innerHTML = `
                    <nav class="neodb-nav"></nav>
                    <div class="neodb-list"><div class="neodb-loading">加载中...</div></div>
                    <div class="block-more block-more__centered">
                        <div class="lds-ripple"></div>
                    </div>
                `;
            });
            this._renderTypes();
            this._fetchData();
            this._handleScroll();
        }

        _clearList() {
            this._applyToAll(container => {
                const list = container.querySelector(".neodb-list");
                if (list) list.innerHTML = '<div class="neodb-loading">加载中...</div>';
            });
        }

        _toggleLoading(show) {
            this._queryAll(".lds-ripple").forEach(el => {
                if (show) {
                    el.classList.remove("u-hide");
                } else {
                    el.classList.add("u-hide");
                }
            });
        }

        _isLoadingHidden() {
            const el = this._queryAll(".lds-ripple")[0];
            return el && el.classList.contains("u-hide");
        }
    }

    // Only init once (avoid double init from duplicated page content)
    let _neodbInitialized = false;
    document.addEventListener("DOMContentLoaded", () => {
        if (_neodbInitialized) return;
        _neodbInitialized = true;
        const neodb = new NeoDB({
            container: ".neodb-container",
            baseAPI: "https://x.numb.tech/api",
            types: ["book", "movie", "music", "game","tv"],
        });
    });
</script>

<script>
    function escapeHtml(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    class NeoDB {
        constructor(config) {
            this.containerSelector = config.container;
            this.types = config.types ?? ["book", "movie", "music", "game","tv"];
            this.typeNames = {
                book: "书",
                movie: "影",
                music: "音",
                game: "游",
                tv: "剧"
            };
            this.baseAPI = config.baseAPI;
            this.type = "book";
            this.status = "complete";
            this.finished = false;
            this.paged = 1;
            this.subjects = [];
            this.musicData = null;
            this._create();
        }

        // Get all container elements (both original and kindle copies)
        _getAllContainers() {
            return document.querySelectorAll(this.containerSelector);
        }

        // Apply function to all containers
        _applyToAll(fn) {
            this._getAllContainers().forEach(fn);
        }

        // Query within all containers
        _queryAll(selector) {
            return document.querySelectorAll(selector);
        }

        on(event, element, callback) {
            const nodeList = document.querySelectorAll(element);
            nodeList.forEach((item) => {
                item.addEventListener(event, callback);
            });
        }

        _handleTypeClick() {
            this.on("click", ".neodb-navItem", (t) => {
                const self = t.currentTarget;
                this.type = self.dataset.type;
                document.querySelectorAll(".neodb-navItem").forEach(el => el.classList.remove("active"));
                self.classList.add("active");
                this._clearList();
                this._toggleLoading(true);
                this.paged = 1;
                this.finished = false;
                this.subjects = [];
                this._fetchData();
            });
        }

        _renderTypes() {
            this._applyToAll(container => {
                const nav = container.querySelector(".neodb-nav");
                if (nav) {
                    nav.innerHTML = this.types
                        .map((item) => {
                            const isActive = item === this.type ? ' active' : '';
                            return `<span class="neodb-navItem${isActive}" data-type="${item}"><span class="nav-text">${this.typeNames[item]}</span></span>`;
                        })
                        .join("");
                }
            });
            this._handleTypeClick();
        }

        _fetchData() {
            if (this.type === 'music') {
                return this._fetchMusicData();
            }

            const params = new URLSearchParams({
                type: "complete",
                category: this.type,
                page: this.paged.toString(),
            });

            return fetch(this.baseAPI + "?" + params.toString())
                .then((response) => response.json())
                .then((data) => {
                    if (data.length) {
                        // 过滤重复项
                        data = data.filter(item => !this.subjects.some(existing => existing.item.id === item.item.id));

                        if (data.length) {
                            this.subjects = [...this.subjects, ...data];
                            this._renderListTemplate();
                        }

                        this._toggleLoading(false);
                    } else {
                        this.finished = true; // 没有更多数据
                        this._toggleLoading(false);
                    }
                });
        }

        _fetchMusicData() {
            // API 列表：优先 Meting 格式，备用网易云 API 格式
            const MUSIC_APIS = [
                { url: 'https://api.injahow.cn/meting/?type=playlist&id=5244529625', type: 'meting' },
                { url: 'https://zm.wwoyun.cn/playlist/detail?id=5244529625', type: 'netease' },
            ];

            const normalize = (data, type) => {
                if (type === 'meting' && Array.isArray(data)) {
                    return data.map(s => ({
                        name: s.name,
                        artist: s.artist || '',
                        id: s.url ? (s.url.match(/id=(\d+)/) || [])[1] : ''
                    }));
                }
                if (type === 'netease' && data.playlist && data.playlist.tracks) {
                    return data.playlist.tracks.map(s => ({
                        name: s.name,
                        artist: (s.ar || []).map(a => a.name).join('/'),
                        id: String(s.id)
                    }));
                }
                return null;
            };

            const tryFetch = (index) => {
                if (index >= MUSIC_APIS.length) {
                    this.finished = true;
                    this._toggleLoading(false);
                    this._applyToAll(container => {
                        const list = container.querySelector(".neodb-list");
                        if (list) list.innerHTML = '<div class="neodb-loading">加载失败，请稍后再试</div>';
                    });
                    return;
                }
                const api = MUSIC_APIS[index];
                fetch(api.url)
                    .then(r => r.json())
                    .then(data => {
                        const songs = normalize(data, api.type);
                        if (songs && songs.length) {
                            this.musicData = songs;
                            this.finished = true;
                            this._renderMusicList(songs);
                            this._toggleLoading(false);
                        } else {
                            tryFetch(index + 1);
                        }
                    })
                    .catch(() => tryFetch(index + 1));
            };

            if (this.musicData) {
                this._renderMusicList(this.musicData);
                this._toggleLoading(false);
                return;
            }
            tryFetch(0);
        }

        _renderMusicList(data) {
            const html = data.map(song => {
                const link = song.id ? `https://music.163.com/#/song?id=${song.id}` : '#';
                const title = "《" + song.name + "》";
                const artist = song.artist || '';

                return `<div class="neodb-item">
                    <div class="neodb-title">
                        <a href="${escapeHtml(link)}" target="_blank">${escapeHtml(title)}</a>
                    </div>
                    <div class="neodb-comment">
                        ${artist ? `<p>${escapeHtml(artist)}</p>` : ""}
                    </div>
                </div>`;
            }).join("");

            this._applyToAll(container => {
                const list = container.querySelector(".neodb-list");
                if (list) list.innerHTML = html;
            });
        }

        _renderListTemplate() {
            const html = this.subjects
                .map((item) => {
                    const title = "《"+item.item.title+"》";
                    const link = item.item.id;
                    const comment_text = item.comment_text;

                    return `<div class="neodb-item">
                        <div class="neodb-title">
                            <a href="${escapeHtml(link)}" target="_blank">${escapeHtml(title)}</a>
                        </div>
                        <div class="neodb-comment">
                            ${comment_text ? `<p>${escapeHtml(comment_text)}</p>` : ""}
                        </div>
                    </div>`;
                })
                .join("");
            this._applyToAll(container => {
                const list = container.querySelector(".neodb-list");
                if (list) list.innerHTML = html;
            });
        }

        _getScrollContainers() {
            const containers = [window];
            const kindleScreen = document.getElementById("kindle-screen");
            if (kindleScreen) containers.push(kindleScreen);
            return containers;
        }

        _handleScroll() {
            let isLoading = false;

            const checkScroll = (scrollEl, isWindow) => {
                const moreElements = this._queryAll(".block-more");
                if (!moreElements.length || this.finished || isLoading) return;

                let scrollTop, viewportHeight;
                if (isWindow) {
                    scrollTop = window.scrollY || window.pageYOffset;
                    viewportHeight = window.innerHeight;
                } else {
                    scrollTop = scrollEl.scrollTop;
                    viewportHeight = scrollEl.clientHeight;
                }

                // Check if ANY .block-more is near bottom of the scroll viewport
                let shouldLoad = false;
                moreElements.forEach(moreElement => {
                    // Get the element's position relative to the scroll container
                    let moreBottom;
                    if (isWindow) {
                        moreBottom = moreElement.offsetTop + moreElement.clientHeight;
                    } else {
                        moreBottom = moreElement.offsetTop - scrollEl.offsetTop + moreElement.clientHeight;
                    }
                    if (moreBottom <= scrollTop + viewportHeight) {
                        shouldLoad = true;
                    }
                });

                if (shouldLoad && this._isLoadingHidden()) {
                    isLoading = true;
                    this._toggleLoading(true);
                    this.paged++;
                    this._fetchData().finally(() => {
                        isLoading = false;
                    });
                }
            };

            this._getScrollContainers().forEach(sc => {
                if (sc === window) {
                    window.addEventListener("scroll", () => checkScroll(window, true));
                } else {
                    sc.addEventListener("scroll", () => checkScroll(sc, false));
                }
            });
        }

        _create() {
            if (!document.querySelector(".neodb-container")) return;

            this._applyToAll(container => {
                container.innerHTML = `
                    <nav class="neodb-nav"></nav>
                    <div class="neodb-list"><div class="neodb-loading">加载中...</div></div>
                    <div class="block-more block-more__centered">
                        <div class="lds-ripple"></div>
                    </div>
                `;
            });
            this._renderTypes();
            this._fetchData();
            this._handleScroll();
        }

        _clearList() {
            this._applyToAll(container => {
                const list = container.querySelector(".neodb-list");
                if (list) list.innerHTML = '<div class="neodb-loading">加载中...</div>';
            });
        }

        _toggleLoading(show) {
            this._queryAll(".lds-ripple").forEach(el => {
                if (show) {
                    el.classList.remove("u-hide");
                } else {
                    el.classList.add("u-hide");
                }
            });
        }

        _isLoadingHidden() {
            const el = this._queryAll(".lds-ripple")[0];
            return el && el.classList.contains("u-hide");
        }
    }

    // Only init once (avoid double init from duplicated page content)
    let _neodbInitialized = false;
    document.addEventListener("DOMContentLoaded", () => {
        if (_neodbInitialized) return;
        _neodbInitialized = true;
        const neodb = new NeoDB({
            container: ".neodb-container",
            baseAPI: "https://x.numb.tech/api",
            types: ["book", "movie", "music", "game","tv"],
        });
    });
</script>

<script>
(function() {
    // ===== Kindle mode toggle =====
    var kindleToggles = document.querySelectorAll('.kindle-toggle');
    var body = document.body;
    var html = document.documentElement;

    // ===== Mobile scale calculation =====
    function updateKindleScale() {
        var kd = document.querySelector('.kindle-device');
        if (!kd || !body.classList.contains('kindle-mode')) return;
        if (window.innerWidth <= 768) {
            // Wait for browser to render, then measure and scale
            requestAnimationFrame(function() {
                requestAnimationFrame(function() {
                    var availW = window.innerWidth - 16;
                    var availH = window.innerHeight - 16;
                    var natW = kd.scrollWidth;
                    var natH = kd.scrollHeight;
                    if (natW === 0 || natH === 0) return;
                    var scale = Math.min(availW / natW, availH / natH, 1);
                    // Use transform:scale (Safari compatible) + negative margins to reflow
                    kd.style.transform = 'scale(' + scale + ')';
                    kd.style.transformOrigin = 'top center';
                    kd.style.marginLeft = (natW * (scale - 1) / 2) + 'px';
                    kd.style.marginRight = (natW * (scale - 1) / 2) + 'px';
                    kd.style.marginBottom = (natH * (scale - 1)) + 'px';
                });
            });
        } else {
            kd.style.transform = '';
            kd.style.transformOrigin = '';
            kd.style.marginLeft = '';
            kd.style.marginRight = '';
            kd.style.marginBottom = '';
        }
    }

    function applyKindleMode(on, animate) {
        var oc = document.getElementById('original-content');
        var kd = document.querySelector('.kindle-device');
        var boot = document.getElementById('kindle-boot');
        if (on) {
            html.classList.add('kindle-mode');
            body.classList.add('kindle-mode');
            updateKindleScale();
            var prehide = document.getElementById('kindle-prehide');
            if (prehide) prehide.remove();

            if (animate && boot) {
                boot.classList.add('active');
                setTimeout(function() {
                    boot.classList.add('fade-out');
                    setTimeout(function() {
                        boot.classList.remove('active', 'fade-out');
                        var bar = document.getElementById('kindle-boot-bar');
                        if (bar) bar.style.width = '';
                    }, 600);
                }, 2800);
            }
        } else {
            // Phase 1: fade out kindle device
            if (kd) {
                kd.style.transition = 'opacity 0.3s ease';
                kd.style.opacity = '0';
            }
            setTimeout(function() {
                // Phase 2: swap display
                html.classList.remove('kindle-mode');
                body.classList.remove('kindle-mode');
                // Remove pre-hide style so original content is visible
                var prehide = document.getElementById('kindle-prehide');
                if (prehide) prehide.remove();
                if (kd) {
                    kd.style.transition = '';
                    kd.style.opacity = '';
                    kd.style.transform = '';
                    kd.style.transformOrigin = '';
                    kd.style.marginLeft = '';
                    kd.style.marginRight = '';
                    kd.style.marginBottom = '';
                }
                // Phase 3: fade in original content
                if (oc) {
                    oc.classList.add('kindle-entering');
                    setTimeout(function() {
                        oc.classList.remove('kindle-entering');
                    }, 350);
                }
            }, 300);
        }
        kindleToggles.forEach(function(btn) {
            var lbl = btn.querySelector('.kindle-label');
            if (lbl) lbl.textContent = on ? '寫' : '墨';
        });
    }

    var storedKindle = localStorage.getItem('kindle-mode');
    if (storedKindle === 'on') {
        applyKindleMode(true);
    }

    // Recalculate scale on resize
    window.addEventListener('resize', function() {
        if (body.classList.contains('kindle-mode')) updateKindleScale();
    });

    kindleToggles.forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            var isOn = body.classList.contains('kindle-mode');
            applyKindleMode(!isOn, true);
            localStorage.setItem('kindle-mode', !isOn ? 'on' : 'off');
        });
    });

    // ===== Scroll container detection =====
    var screenEl = document.getElementById('kindle-screen');
    function isScreenScroll() {
        return body.classList.contains('kindle-mode') && screenEl && window.getComputedStyle(screenEl).overflowY === 'auto';
    }
    function getScrollTop() {
        return isScreenScroll() ? screenEl.scrollTop : window.scrollY;
    }
    function scrollToTop(options) {
        if (isScreenScroll()) { screenEl.scrollTo(options); }
        else { window.scrollTo(options); }
    }
    function onScroll(fn) {
        window.addEventListener('scroll', fn);
        if (screenEl) screenEl.addEventListener('scroll', fn);
    }

    // ===== Dark mode toggle =====
    var themeToggles = document.querySelectorAll('.theme-toggle');
    var html = document.documentElement;

    function updateThemeLabels(theme) {
        var text = theme === 'dark' ? '明' : '暗';
        themeToggles.forEach(function(btn) {
            var lbl = btn.querySelector('.theme-label');
            if (lbl) lbl.textContent = text;
        });
    }

    var stored = localStorage.getItem('theme');
    var currentTheme = null;

    if (stored === 'dark' || stored === 'light') {
        html.setAttribute('data-theme', stored);
        currentTheme = stored;
    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        html.setAttribute('data-theme', 'dark');
        currentTheme = 'dark';
    }

    updateThemeLabels(currentTheme || 'light');

    themeToggles.forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            var current = html.getAttribute('data-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeLabels(next);
        });
    });

    // ===== Back to top =====
    var backTop = document.getElementById('back-top');
    if (backTop) {
        onScroll(function() {
            if (getScrollTop() > 400) {
                backTop.classList.add('show');
            } else {
                backTop.classList.remove('show');
            }
        });
        backTop.addEventListener('click', function(e) {
            e.preventDefault();
            scrollToTop({ top: 0, behavior: 'smooth' });
        });
    }

    // ===== Year jump =====
    var yearJump = document.getElementById('year-jump');
    var yearJumpPanel = document.getElementById('year-jump-panel');
    var yearElements = document.querySelectorAll('.archive .year');

    if (yearJump && yearJumpPanel && yearElements.length > 1) {
        yearJump.classList.add('active');

        yearElements.forEach(function(el) {
            var a = document.createElement('a');
            a.href = '#' + el.id;
            a.textContent = el.textContent;
            a.addEventListener('click', function(e) {
                e.preventDefault();
                if (isScreenScroll()) {
                    screenEl.querySelector('#' + el.id).scrollIntoView({ behavior: 'smooth', block: 'start' });
                } else {
                    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
                yearJumpPanel.classList.remove('show');
            });
            yearJumpPanel.appendChild(a);
        });

        yearJump.addEventListener('click', function(e) {
            e.preventDefault();
            yearJumpPanel.classList.toggle('show');
        });

        document.addEventListener('click', function(e) {
            if (!yearJump.contains(e.target) && !yearJumpPanel.contains(e.target)) {
                yearJumpPanel.classList.remove('show');
            }
        });
    }

    // ===== Kindle page turn buttons =====
    var prevBtn = document.getElementById('kindle-prev');
    var nextBtn = document.getElementById('kindle-next');
    function handlePageTurn(direction) {
        if (!isScreenScroll()) return;
        var pageHeight = screenEl.clientHeight;
        screenEl.scrollBy({
            top: direction === 'next' ? pageHeight : -pageHeight,
            behavior: 'smooth'
        });
    }
    if (prevBtn) prevBtn.addEventListener('click', function() { handlePageTurn('prev'); });
    if (nextBtn) nextBtn.addEventListener('click', function() { handlePageTurn('next'); });

    // ===== Kindle home button (back to top) =====
    var kindleHomeBtn = document.getElementById('kindle-home-btn');
    if (kindleHomeBtn) {
        kindleHomeBtn.addEventListener('click', function() {
            scrollToTop({ top: 0, behavior: 'smooth' });
        });
    }

    // ===== Kindle status bar clock =====
    var kindleTimeEls = document.querySelectorAll('#kindle-time');
    function updateKindleTime() {
        var now = new Date();
        var h = now.getHours();
        var ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        var m = String(now.getMinutes()).padStart(2, '0');
        var text = h + ':' + m + ' ' + ampm;
        kindleTimeEls.forEach(function(el) { el.textContent = text; });
    }
    if (kindleTimeEls.length) {
        updateKindleTime();
        setInterval(updateKindleTime, 30000);
    }

    // ===== Read count =====
    var readBtns = document.querySelectorAll('#read-btn');
    var readCountEls = document.querySelectorAll('#read-count');
    if (readBtns.length && readCountEls.length) {
        var counterUrl = 'https://counter.numb.tech';
        var slug = readBtns[0].getAttribute('data-slug');
        var storageKey = 'read_' + slug;
        var hasRead = localStorage.getItem(storageKey);

        if (counterUrl && slug) {
            fetch(counterUrl + '?slug=' + encodeURIComponent(slug))
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    if (d.count !== undefined) {
                        readCountEls.forEach(function(el) { el.textContent = d.count; });
                    }
                })
                .catch(function() {});

            if (hasRead) {
                readBtns.forEach(function(btn) { btn.classList.add('read-done'); });
            }

            readBtns.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    if (hasRead) return;
                    hasRead = '1';
                    localStorage.setItem(storageKey, '1');
                    readBtns.forEach(function(b) { b.classList.add('read-done'); });

                    var fly = document.createElement('span');
                    fly.className = 'read-fly';
                    fly.textContent = '+1';
                    btn.parentNode.appendChild(fly);
                    setTimeout(function() { fly.remove(); }, 900);

                    fetch(counterUrl + '?slug=' + encodeURIComponent(slug), { method: 'POST' })
                        .then(function(r) { return r.json(); })
                        .then(function(d) {
                            if (d.count !== undefined) {
                                readCountEls.forEach(function(el) { el.textContent = d.count; });
                            }
                            if (d.duplicate) {
                                hasRead = null;
                                localStorage.removeItem(storageKey);
                                readBtns.forEach(function(b) { b.classList.remove('read-done'); });
                            }
                        })
                        .catch(function() {});
                });
            });
        }
    }

})();
</script>

</html>
